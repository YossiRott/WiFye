  <!-- Lower eyelid -->
  <path d="M8 32 Q20 46 32 46 Q44 46 56 32"
        stroke="white" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- Iris ring -->
  <circle cx="32" cy="32" r="9" stroke="white" stroke-width="2.5" fill="rgba(255,255,255,0.1)"/>
  <!-- Pupil -->
  <circle cx="32" cy="32" r="4" fill="white"/>
  <!-- Outer corner mark (left): Egyptian falcon stripe curving down -->
  <path d="M8 32 L5 41 Q8 50 14 47"
        stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Inner corner mark (right): vertical drop with horizontal tick -->
  <path d="M56 32 L59 40 L54 47"
        stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
